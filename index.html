<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雅思词汇闪卡 - 旗舰版</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        /* --- CSS 变量定义主题色 --- */
        :root {
            --primary-color: #6c5ce7;
            --primary-light: #a29bfe;
            --primary-dark: #5b4cdb;
            --primary-glow: rgba(108, 92, 231, 0.4);
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
        }

        /* 主题色：天空蓝 */
        body.theme-blue {
            --primary-color: #3498db;
            --primary-light: #74b9ff;
            --primary-dark: #2980b9;
            --primary-glow: rgba(52, 152, 219, 0.4);
            --gradient-start: #74b9ff;
            --gradient-end: #0984e3;
        }

        /* 主题色：薄荷绿 */
        body.theme-green {
            --primary-color: #00b894;
            --primary-light: #55efc4;
            --primary-dark: #00a085;
            --primary-glow: rgba(0, 184, 148, 0.4);
            --gradient-start: #55efc4;
            --gradient-end: #00b894;
        }

        /* 主题色：活力橙 */
        body.theme-orange {
            --primary-color: #e67e22;
            --primary-light: #fab1a0;
            --primary-dark: #d35400;
            --primary-glow: rgba(230, 126, 34, 0.4);
            --gradient-start: #fc917a;
            --gradient-end: #e67e22;
        }

        
        /* 主题色：落霞 */
        body.theme-sunset {
            --primary-color: #FA7C5E;
            --primary-light: #FFB199;
            --primary-dark: #E66A4D;
            --primary-glow: rgba(250, 124, 94, 0.4);
            --gradient-start: #FFB199;
            --gradient-end: #FA7C5E;
        }

        /* --- 基础样式 --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: row; height: 100vh; margin: 0;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            overflow: hidden;
            transition: background 0.3s ease;
        }
        
        /* 电脑端默认的侧边栏样式 */
        #side-menu {
            width: 280px; height: 100vh; background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2); transition: margin-left 0.3s ease, background 0.3s ease;
            margin-left: -280px; display: flex; flex-direction: column;
            padding-top: 20px; flex-shrink: 0; z-index: 1003; overflow-y: auto;
            position: relative; /* 电脑端占位，推挤右侧 */
        }

        /* iOS Safari 适配：使用 dvh 单位 */
        @supports (height: 100dvh) {
            body { height: 100dvh; }
            #main-area { height: 100dvh; }
            #side-menu { height: 100dvh; }
        }
        #side-menu.open { margin-left: 0; }

        /* 新增：遮罩层基础样式（默认隐藏） */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: 1002;
        }

        .category-selector-container { padding: 15px 25px; border-bottom: 1px solid #f1f2f6; transition: border-color 0.3s; }
        .category-selector-container label { font-size: 14px; color: #636e72; font-weight: bold; display: block; margin-bottom: 8px; }
        #category-select, #theme-select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #dfe6e9; color: #2d3436; font-size: 14px; outline: none; transition: all 0.3s; }

        #side-menu a { padding: 18px 25px; text-decoration: none; color: #2d3436; font-size: 16px; font-weight: bold; border-bottom: 1px solid #f1f2f6; transition: 0.2s; }
        #side-menu a:hover { background: #f8f9fa; color: var(--primary-color); padding-left: 30px; }
        #side-menu .danger-reset-link {
            margin-top: auto;
            margin: auto 20px 20px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff7675, #d63031);
            color: #fff !important;
            text-align: center;
            box-shadow: 0 8px 20px rgba(214, 48, 49, 0.25);
            padding: 14px 16px;
        }
        #side-menu .danger-reset-link:hover {
            background: linear-gradient(135deg, #ff6b6b, #c0392b);
            color: #fff !important;
            padding-left: 16px;
            transform: translateY(-1px);
        }

        #main-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; height: 100vh; overflow: hidden; transition: width 0.3s ease; }

        #menu-btn {
            position: absolute;
            top: max(20px, env(safe-area-inset-top, 20px));
            left: max(20px, env(safe-area-inset-left, 20px));
            font-size: 24px; 
            color: white; 
            cursor: pointer; 
            z-index: 1001; /* 保证在主区域最上层 */
            text-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            transition: all 0.2s; 
            background: rgba(255, 255, 255, 0.2);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            backdrop-filter: blur(5px);
        }
        #menu-btn:hover { 
            transform: scale(1.1); 
            background: rgba(255, 255, 255, 0.3);
        }

        /* 当侧边栏打开时，如果是白底，让汉堡按钮变色 */
        #side-menu.open ~ #main-area #menu-btn {
            color: var(--primary-color); 
            background: rgba(108, 92, 231, 0.1); /* 给一点淡紫色的半透明底座 */
        }

        /* 电脑端默认卡片样式 */
        .card-container {
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            text-align: center; 
            width: 350px; 
            transition: all 0.3s ease; 
            max-height: 85vh; 
            display: flex; 
            flex-direction: column; 
        }

        /* --- 手机端响应式布局核心 --- */
        @media (max-width: 600px) {
            #side-menu {
                position: fixed; /* 手机端悬浮在上方，不推挤 */
                width: 80%;      /* 占据 80% 屏幕 */
                max-width: 300px;
                margin-left: -100%; /* 默认藏在最左侧边 */
            }
            #side-menu.open {
                margin-left: 0;
            }
            /* 手机端打开菜单时，显示遮罩层 */
            #side-menu.open ~ #overlay {
                display: block;
            }
            /* 手机端主区域强制满宽 */
            #main-area {
                width: 100% !important;
                margin-left: 0 !important;
            }
            /* 手机端卡片微调，防拥挤 */
            .card-container {
                width: 85vw;
                padding: 25px 20px;
            }
        }

        #welcome-screen h1 { color: var(--primary-color); font-size: 36px; margin-bottom: 10px; transition: color 0.3s; }
        #welcome-screen p { color: #636e72; font-size: 16px; margin-bottom: 30px; line-height: 1.6; }
        .highlight-text { color: var(--primary-light); font-weight: bold; font-size: 18px; }
        #stats { font-size: 14px; color: var(--primary-light); margin-bottom: 15px; font-weight: bold; }
        
        #flashcard-screen h1 { color: #2d3436; font-size: 42px; margin: 10px 0; letter-spacing: 1px; transition: color 0.3s;}
        
        #phonetic-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; min-height: 24px; flex-wrap: wrap; }
        #phonetic { color: var(--primary-color); font-size: 1.2rem; }
        
        .pos-badge { background: var(--primary-light); color: white; padding: 2px 8px; border-radius: 6px; font-size: 13px; font-weight: bold; display: inline-block; }

        #current-category-badge { display: inline-block; font-size: 12px; color: var(--primary-light); border: 1px solid var(--primary-light); padding: 2px 8px; border-radius: 20px; margin-bottom: 15px; align-self: center; }

        #meaning { color: #636e72; font-size: 18px; min-height: 100px; margin-bottom: 30px; cursor: pointer; padding: 15px; border: 1px dashed #dfe6e9; border-radius: 10px; display: flex; align-items: center; justify-content: center; white-space: pre-wrap; overflow-y: auto; transition: all 0.3s; }
        
        #list-screen { display: none; padding: 30px 20px; width: 90%; max-width: 450px; text-align: left; max-height: 75vh; overflow: hidden; flex-direction: column; }
        #list-title { color: var(--primary-color); font-size: 24px; margin-top: 0; margin-bottom: 15px; text-align: center; transition: color 0.3s;}
        
        #list-filters { display: flex; gap: 10px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px solid #f1f2f6; justify-content: center; transition: border-color 0.3s;}
        .filter-select { padding: 6px; border-radius: 6px; border: 1px solid #dfe6e9; color: #636e72; font-size: 13px; outline: none; background: #f8f9fa; cursor: pointer; transition: all 0.3s;}

        #list-content-wrapper { overflow-y: auto; flex-grow: 1; margin-bottom: 15px; padding-right: 5px;}
        #status-screen { display: none; padding: 30px 20px; width: 90%; max-width: 450px; text-align: left; overflow: hidden; }
        #status-content-wrapper { overflow-y: auto; flex-grow: 1; margin-bottom: 15px; padding-right: 5px; }
        .list-item { border-bottom: 1px solid #f1f2f6; padding: 12px 0; transition: border-color 0.3s; }
        .list-category-tag { display: inline-block; margin-bottom: 6px; padding: 2px 8px; font-size: 11px; border-radius: 999px; color: white; border: none; background: linear-gradient(90deg, var(--primary-color), var(--primary-light)); }
        .list-word { font-weight: bold; color: #2d3436; font-size: 18px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; transition: color 0.3s;}
        .list-meaning { color: #636e72; font-size: 14px; margin-top: 5px; transition: color 0.3s;}
        .list-favorite-toggle { margin-left: auto; border: none; background: none; color: #fdcb6e; font-size: 20px; cursor: pointer; padding: 2px 4px; line-height: 1; width: auto; box-shadow: none; }
        #favorite-btn { color: var(--primary-color); text-shadow: none; }
        
        button { background: var(--primary-color); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px var(--primary-glow); transition: transform 0.2s; width: 100%; flex-shrink: 0; }
        button:active { transform: scale(0.95); }
        #controls { display: none; grid-template-columns: 1fr 1fr; gap: 10px; }
        #flashcard-screen { display: none; }

        /* =========================================
           夜间模式专属样式
           ========================================= */
        body.dark-mode {
            background: linear-gradient(135deg, #121212 0%, #2a2a2a 100%);
        }
        body.dark-mode #side-menu,
        body.dark-mode .card-container {
            background: #2b2b36;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        body.dark-mode h1, 
        body.dark-mode #side-menu a, 
        body.dark-mode .list-word,
        body.dark-mode #flashcard-screen h1 {
            color: #f1f2f6;
        }
        body.dark-mode #welcome-screen p { color: #a4b0be; }
        body.dark-mode #side-menu a:hover {
            background: #3f3f4e;
        }
        body.dark-mode #side-menu .danger-reset-link,
        body.dark-mode #side-menu .danger-reset-link:hover {
            background: linear-gradient(135deg, #ff7675, #e74c3c);
            color: #fff !important;
        }
        body.dark-mode #meaning {
            color: #dcdde1;
            border-color: #4a4a6a;
        }
        body.dark-mode .category-selector-container,
        body.dark-mode .list-item,
        body.dark-mode #list-filters,
        body.dark-mode #side-menu a {
            border-bottom-color: #3f3f4e;
        }
        body.dark-mode #category-select,
        body.dark-mode #theme-select,
        body.dark-mode .filter-select {
            background: #3f3f4e;
            color: #f1f2f6;
            border-color: #4a4a6a;
        }
        body.dark-mode .list-meaning {
            color: #a4b0be;
        }
        body.dark-mode .list-category-tag {
            color: white;
            border: none;
            background: linear-gradient(90deg, var(--primary-color), var(--primary-light));
        }
        body.dark-mode .list-favorite-toggle,
        body.dark-mode #favorite-btn {
            color: #ffeaa7;
        }
        /* 夜间模式且侧边栏打开时，汉堡图标的颜色适应 */
        body.dark-mode #side-menu.open ~ #main-area #menu-btn {
            color: #f1f2f6;
            background: rgba(255, 255, 255, 0.1);
        }

        /* --- [进度条组件样式] --- */
        .progress-title { margin: 0 0 10px 0; font-size: 16px; color: #2d3436; }
        .progress-stats { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; color: #636e72; }
        .progress-bar-bg { width: 100%; height: 12px; background: #dfe6e9; border-radius: 6px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .category-progress-item { margin-bottom: 5px; }

        /* 进度条夜间模式适配 */
        body.dark-mode .progress-title { color: #f1f2f6; border-bottom-color: #3f3f4e !important; }
        body.dark-mode .progress-stats { color: #a4b0be; }
        body.dark-mode .progress-bar-bg { background: #3f3f4e; }
    </style>
</head>
<body>

    <div id="side-menu">
        <div class="category-selector-container">
            <label>📚 选择当前词库</label>
            <select id="category-select" onchange="changeCategory()">
                <option value="all">全库混背 (All)</option>
            </select>
        </div>
        <a href="#" onclick="switchView('flashcard-screen')">📖 开始背诵</a>
        <a href="#" onclick="showList('learned')">✅ 已背诵单词</a>
        <a href="#" onclick="showList('unlearned')">📝 未背诵单词</a>
        <a href="#" onclick="showList('favorite')">⭐ 收藏单词</a>
        <a href="#" onclick="showStatus()">📈 学习进度</a>
        <div class="category-selector-container" style="margin-top: 10px;">
            <label>🎨 主题色：</label>
            <select id="theme-select" onchange="changeTheme()">
                <option value="purple">🟣 紫罗兰</option>
                <option value="blue">🔵 天空蓝</option>
                <option value="green">🟢 薄荷绿</option>
                <option value="orange">🟠 活力橙</option>
                <option value="sunset">🟧 落霞</option>
            </select>
        </div>
        <a href="#" onclick="toggleDarkMode()">🌙 / ☀️ 夜间模式</a>
        <a href="#" onclick="toggleAutoSpeak()">🔊 自动发音: <span id="auto-speak-status">开</span></a>
        <a href="#" onclick="backupProgress()">📥 备份进度 (导出 JSON)</a>
        <a href="#" onclick="document.getElementById('import-file').click()">📤 恢复进度 (导入 JSON)</a>
        <input type="file" id="import-file" style="display:none" onchange="importProgress(this)">
        <a href="#" onclick="resetCount()" class="danger-reset-link">⚠️ 重置所有进度</a>
    </div>

    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="main-area">
        <div id="menu-btn" onclick="toggleMenu()">☰</div>

        <div id="welcome-screen" class="card-container">
            <h1>雅思闪卡🚀</h1>
            <p>今日已学习的单词：<br><span class="highlight-text"><span id="welcome-count">0</span> 个</span></p>
            <button onclick="enterApp()">开始今天的挑战</button>
        </div>

        <div id="flashcard-screen" class="card-container">
            <div id="current-category-badge">当前：全库混合</div>
            <div id="stats">今日已学 <span id="count">0</span> | 本库待复习：<span id="review-count">0</span></div>
            <div style="position: relative;">
                <h1 id="word">Ready?</h1>
                <button id="favorite-btn" onclick="toggleFavorite()" style="position: absolute; right: -10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px; width: auto; box-shadow: none;">☆</button>
            </div>
            <div id="phonetic-container">
                <span id="phonetic"></span>
                <div id="pos-container" style="display: flex; gap: 5px;"></div>
            </div>
            <button onclick="speakCurrentWord()" style="background: none; border: 1px solid var(--primary-color); color: var(--primary-color); padding: 5px 15px; font-size: 12px; margin-bottom: 15px; width: auto; box-shadow: none;">🔊 再次发音</button>
            <div id="meaning">点击看释义</div>
            <div id="controls">
                <button onclick="handleRate(1)" style="background: #ff7675; font-size: 14px;">生疏 (1d)</button>
                <button onclick="handleRate(2)" style="background: #fdcb6e; font-size: 14px;">模糊 (2d)</button>
                <button onclick="handleRate(3)" style="background: #55efc4; font-size: 14px;">熟悉 (4d)</button>
                <button onclick="handleRate(5)" style="background: #00cec9; font-size: 14px;">简单(7d)</button>
            </div>
            <button id="start-btn" onclick="nextWord()" style="display: none;">下一个</button>
        </div>

        <div id="list-screen" class="card-container">
            <h2 id="list-title">单词列表</h2>
            
            <div id="list-filters">
                <select id="filter-date" class="filter-select" onchange="applyFilters()">
                    <option value="all">📅 全部时间</option>
                    <option value="today">今天</option>
                    <option value="yesterday">昨天</option>
                    <option value="earlier">更早之前</option>
                </select>
                <select id="filter-level" class="filter-select" onchange="applyFilters()">
                    <option value="all">🧠 所有熟练度</option>
                    <option value="1">生疏 (1d)</option>
                    <option value="2">模糊 (2d)</option>
                    <option value="3">熟悉 (4d)</option>
                    <option value="5">简单(7d)</option>
                </select>
                <select id="filter-category" class="filter-select" onchange="applyFilters()" style="display:none;">
                    <option value="all">📁 全部分类</option>
                </select>
            </div>

            <div id="list-content-wrapper">
                <div id="list-content"></div>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 10px; flex-shrink: 0; margin-bottom: 20px;">
                <button onclick="switchView('flashcard-screen')" style="flex: 1;">返回背诵</button>
                <button id="export-btn" onclick="exportToExcel()" style="flex: 1; background: #00b894; display: none;">📊 导出 Excel</button>
            </div>
        </div>

        
        <div id="status-screen" class="card-container">
            <h2 id="status-title" style="color: var(--primary-color); text-align: center; margin-top: 0; margin-bottom: 25px;">📊 学习进度</h2>

            <div id="status-content-wrapper">
                <div style="margin-bottom: 30px;">
                    <h3 class="progress-title">🏆 总进度</h3>
                    <div class="progress-stats">
                        <span id="overall-progress-text">0 / 0</span>
                        <span id="overall-progress-percent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="overall-progress-fill" class="progress-bar-fill" style="background: linear-gradient(90deg, var(--primary-color), var(--primary-light));"></div>
                    </div>
                </div>

                <h3 class="progress-title" style="border-bottom: 1px solid #f1f2f6; padding-bottom: 10px; margin-bottom: 15px;">📁 分类进度</h3>
                <div id="category-progress-container" style="display: flex; flex-direction: column; gap: 15px;">
                </div>
            </div>

             <button onclick="switchView('flashcard-screen')" style="margin-top: 10px;">返回背诵</button>
        </div>
    </div>

    <script src="words.js"></script>
    
    <script>
        let currentWord = null;
        let wordData = JSON.parse(localStorage.getItem('ielts_word_data')) || {};

        // 检查是否需要重置每日计数（跨天时）
        function getDailyCount() {
            const savedDate = localStorage.getItem('ielts_study_date');
            const today = new Date().toDateString();
            if (savedDate !== today) {
                // 新的一天，重置计数
                localStorage.setItem('ielts_study_date', today);
                localStorage.setItem('ielts_study_count', '0');
                return 0;
            }
            return parseInt(localStorage.getItem('ielts_study_count')) || 0;
        }

        let dailyCount = getDailyCount();
        let isAppStarted = false; 
        let currentListMode = 'learned'; 
        let currentCategory = localStorage.getItem('ielts_current_category') || 'all';
        let currentFilteredWords = [];

        const levelStyleMap = {
            1: { text: "生疏", color: "#ff7675" },
            2: { text: "模糊", color: "#fdcb6e" },
            3: { text: "熟悉", color: "#55efc4" },
            5: { text: "简单", color: "#00cec9" }
        };

        document.getElementById('welcome-count').innerText = dailyCount;
        document.getElementById('count').innerText = dailyCount;

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('ielts_dark_mode', isDark);
        }

        function initDarkMode() {
            const savedMode = localStorage.getItem('ielts_dark_mode');

            // 如果用户手动设过（true/false），就按手动设置
            if (savedMode !== null) {
                if (savedMode === 'true') document.body.classList.add('dark-mode');
            }
        }

        // 主题色切换
        function changeTheme() {
            const theme = document.getElementById('theme-select').value;
            document.body.classList.remove('theme-blue', 'theme-green', 'theme-orange', 'theme-sunset');
            if (theme !== 'purple') {
                document.body.classList.add(`theme-${theme}`);
            }
            localStorage.setItem('ielts_theme', theme);
        }

        // 自动发音设置
        let autoSpeakEnabled = localStorage.getItem('ielts_auto_speak') !== 'false'; // 默认开启

        function toggleAutoSpeak() {
            autoSpeakEnabled = !autoSpeakEnabled;
            localStorage.setItem('ielts_auto_speak', autoSpeakEnabled);
            document.getElementById('auto-speak-status').innerText = autoSpeakEnabled ? '开' : '关';
        }

        function initAutoSpeak() {
            const saved = localStorage.getItem('ielts_auto_speak');
            if (saved !== null) {
                autoSpeakEnabled = saved === 'true';
            }
            document.getElementById('auto-speak-status').innerText = autoSpeakEnabled ? '开' : '关';
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('ielts_theme') || 'purple';
            document.getElementById('theme-select').value = savedTheme;
            if (savedTheme !== 'purple') {
                document.body.classList.add(`theme-${savedTheme}`);
            }
        }

        function initCategories() {
            initDarkMode();
            initTheme();
            initAutoSpeak(); 
            
            const allWords = window.ieltsWords || [];
            const categories = [...new Set(allWords.map(w => w.category || '未分类'))].sort();
            const select = document.getElementById('category-select');
            const listCategorySelect = document.getElementById('filter-category');

            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.innerText = cat;
                select.appendChild(option);

                const listOption = document.createElement('option');
                listOption.value = cat;
                listOption.innerText = cat;
                listCategorySelect.appendChild(listOption);
            });
            select.value = currentCategory;
            updateCategoryBadge();
        }

        function changeCategory() {
            currentCategory = document.getElementById('category-select').value;
            localStorage.setItem('ielts_current_category', currentCategory);
            updateCategoryBadge();
            
            if (document.getElementById('flashcard-screen').style.display === 'flex') {
                nextWord();
            }
            if (document.getElementById('list-screen').style.display === 'flex' && currentListMode === 'unlearned') {
                applyFilters();
            }
        }

        function updateCategoryBadge() {
            const badge = document.getElementById('current-category-badge');
            const select = document.getElementById('category-select');
            badge.innerText = "当前：" + select.options[select.selectedIndex].text;
        }

        window.onload = initCategories;

        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            menu.classList.toggle('open');
        }

        function switchView(viewId) {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('flashcard-screen').style.display = 'none';
            document.getElementById('list-screen').style.display = 'none';
            document.getElementById('status-screen').style.display = 'none';
            document.getElementById(viewId).style.display = 'flex';
            if (viewId === 'flashcard-screen' && !isAppStarted) { isAppStarted = true; nextWord(); }
        }

        function enterApp() { switchView('flashcard-screen'); }

        function isToday(timestamp) {
            if (!timestamp) return false;
            const d = new Date(timestamp); const today = new Date();
            return d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
        }
        function isYesterday(timestamp) {
            if (!timestamp) return false;
            const d = new Date(timestamp); const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            return d.getDate() === yesterday.getDate() && d.getMonth() === yesterday.getMonth() && d.getFullYear() === yesterday.getFullYear();
        }
        function getDateKey(timestamp) {
            if (!timestamp) return null;
            const d = new Date(timestamp);
            return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
        }

        function isLearnedRecord(record) {
            return !!(record && record.level && record.lastReviewed && record.nextReview);
        }

        function showList(type) {
            currentListMode = type;
            const listFilters = document.getElementById('list-filters');
            const dateFilter = document.getElementById('filter-date');
            const levelFilter = document.getElementById('filter-level');
            const categoryFilter = document.getElementById('filter-category');

            dateFilter.value = 'all';
            levelFilter.value = 'all';
            categoryFilter.value = 'all';

            if (type === 'learned') {
                listFilters.style.display = 'flex';
                dateFilter.style.display = '';
                levelFilter.style.display = '';
                categoryFilter.style.display = '';
                document.getElementById('export-btn').style.display = 'block';
            } else if (type === 'favorite') {
                listFilters.style.display = 'flex';
                dateFilter.style.display = 'none';
                levelFilter.style.display = 'none';
                categoryFilter.style.display = '';
                document.getElementById('export-btn').style.display = 'block';
            } else {
                listFilters.style.display = 'none';
                dateFilter.style.display = '';
                levelFilter.style.display = '';
                categoryFilter.style.display = 'none';
                document.getElementById('export-btn').style.display = 'none';
            }

            applyFilters();
            switchView('list-screen');
        }

        function applyFilters() {
            const allWords = window.ieltsWords || [];
            const categoryWords = currentCategory === 'all' ? allWords : allWords.filter(w => w.category === currentCategory);
            const listCategoryFilter = document.getElementById('filter-category').value;
            let targetWords = [];
            let titleText = "";

            if (currentListMode === 'learned') {
                targetWords = allWords.filter(w => isLearnedRecord(wordData[w.word]));
                const dateFilter = document.getElementById('filter-date').value;
                const levelFilter = document.getElementById('filter-level').value;

                if (dateFilter === 'today') targetWords = targetWords.filter(w => isToday(wordData[w.word].lastReviewed));
                else if (dateFilter === 'yesterday') targetWords = targetWords.filter(w => isYesterday(wordData[w.word].lastReviewed));
                else if (dateFilter === 'earlier') targetWords = targetWords.filter(w => !isToday(wordData[w.word].lastReviewed) && !isYesterday(wordData[w.word].lastReviewed));

                if (levelFilter !== 'all') targetWords = targetWords.filter(w => wordData[w.word].level == levelFilter);
                 if (listCategoryFilter !== 'all') {
                    targetWords = targetWords.filter(w => (w.category || '未分类') === listCategoryFilter);
                }

                titleText = `✅ 已背诵(${targetWords.length})`;
            } else if (currentListMode === 'favorite') {
                targetWords = allWords.filter(w => wordData[w.word] && wordData[w.word].isFavorite);
                 if (listCategoryFilter !== 'all') {
                    targetWords = targetWords.filter(w => (w.category || '未分类') === listCategoryFilter);
                }
                titleText = `⭐ 收藏单词 (${targetWords.length})`;
            } else {
                targetWords = categoryWords.filter(w => !isLearnedRecord(wordData[w.word]));
                titleText = `📝 未背诵(${targetWords.length})`;

                if (targetWords.length > 100) {
                    titleText += " (仅展示前100个)";
                    targetWords = targetWords.slice(0, 100);
                }
            }

            currentFilteredWords = targetWords;
            document.getElementById('list-title').innerText = titleText;
            renderListHTML(targetWords);
        }

        // 生成并展示学习进度
        function showStatus() {
            const allWords = window.ieltsWords || [];
            if (allWords.length === 0) return;

            // 1. 计算总进度
            const totalWords = allWords.length;
            const learnedWords = allWords.filter(w => isLearnedRecord(wordData[w.word])).length;
            const overallPercent = totalWords === 0 ? 0 : Math.round((learnedWords / totalWords) * 100);

            document.getElementById('overall-progress-text').innerText = `${learnedWords} / ${totalWords}`;
            document.getElementById('overall-progress-percent').innerText = `${overallPercent}%`;

            // 2. 计算各个分类的进度
            const categoryStats = {};
            allWords.forEach(w => {
                const cat = w.category || '未分类';
                if (!categoryStats[cat]) categoryStats[cat] = { total: 0, learned: 0 };
                categoryStats[cat].total++;
                if (isLearnedRecord(wordData[w.word])) categoryStats[cat].learned++;
            });

            // 3. 动态生成分类进度条 HTML
            const container = document.getElementById('category-progress-container');
            container.innerHTML = '';
            const sortedCategories = Object.keys(categoryStats).sort();

            let html = '';
            sortedCategories.forEach(cat => {
                const stats = categoryStats[cat];
                const percent = stats.total === 0 ? 0 : Math.round((stats.learned / stats.total) * 100);
                html += `
                <div class="category-progress-item">
                    <div class="progress-stats">
                        <span style="font-weight: bold;">${cat}</span>
                        <span>${stats.learned} / ${stats.total} (${percent}%)</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: 0%; background: linear-gradient(90deg, var(--primary-color), var(--primary-light));"></div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;

            // 4. 切换到进度面板
            switchView('status-screen');

            // 5. 延迟执行动画
            setTimeout(() => {
                document.getElementById('overall-progress-fill').style.width = `${overallPercent}%`;
                const fills = container.querySelectorAll('.progress-bar-fill');
                sortedCategories.forEach((cat, index) => {
                    const stats = categoryStats[cat];
                    const percent = stats.total === 0 ? 0 : Math.round((stats.learned / stats.total) * 100);
                    if (fills[index]) fills[index].style.width = `${percent}%`;
                });
            }, 50);
        }

        function renderListHTML(wordsArray) {
            const content = document.getElementById('list-content');
            content.innerHTML = '';
            if (wordsArray.length === 0) { content.innerHTML = '<p style="text-align:center; color:#ccc; margin-top:30px;">没有找到符合条件的单词~</p>'; return; }

            wordsArray.forEach(w => {
                const shouldShowCategory = currentListMode === 'favorite' || currentListMode === 'learned';
                const categoryTagHTML = shouldShowCategory ? `<div class="list-category-tag">📁 ${w.category || '未分类'}</div>` : '';
                let posBadgesHTML = '';
                if (w.pos) {
                    const posArray = w.pos.split(/[\/\s]+/).filter(p => p.trim() !== '');
                    posBadgesHTML = posArray.map(p => `<span class="pos-badge" style="padding: 2px 6px; font-size: 11px; margin-right: 2px;">${p}</span>`).join('');
                }
                let memoryBadgeHTML = '';
                if (currentListMode === 'learned') {
                    const record = wordData[w.word];
                    if (record && record.level && levelStyleMap[record.level]) {
                        const styleInfo = levelStyleMap[record.level];
                        memoryBadgeHTML = `<span onclick="changeWordLevel('${w.word}', event)" style="border: 1px solid ${styleInfo.color}; color: ${styleInfo.color}; padding: 1px 5px; border-radius: 4px; font-size: 10px; margin-left: auto; cursor: pointer; user-select: none;" title="点击修改熟练度">${styleInfo.text}</span>`;
                    }
                }
                const favoriteToggleHTML = currentListMode === 'favorite'
                    ? `<button class="list-favorite-toggle" onclick="toggleFavoriteByWord('${w.word}', event)" title="取消收藏">★</button>`
                    : '';
                content.innerHTML += `
                    <div class="list-item">
                        ${categoryTagHTML}
                        <div class="list-word"><span>${w.word}</span><div style="display:flex; gap:2px; flex-wrap:wrap;">${posBadgesHTML}</div><span style="font-size:13px; color:var(--primary-light); font-weight:normal; margin-left: 4px;">${w.phonetic || ''}</span>${memoryBadgeHTML}${favoriteToggleHTML}</div>
                        <div class="list-meaning">${w.meaning}</div>
                    </div>`;
            });
        }

        function exportToExcel() {
            if (currentFilteredWords.length === 0) {
                alert("当前列表为空，没有可以导出的数据！");
                return;
            }

            let csvContent = "\uFEFF"; 
            csvContent += "分类,单词,词性,音标,释义,例句,熟练度,最近打卡日期,下次复习日期\n";

            currentFilteredWords.forEach(w => {
                const record = wordData[w.word] || {};
                const levelText = record.level ? levelStyleMap[record.level].text : "无记录";
                
                const lastDate = record.lastReviewed ? new Date(record.lastReviewed).toLocaleDateString() : "无记录";
                const nextDate = record.nextReview ? new Date(record.nextReview).toLocaleDateString() : "无记录";
                
                const safeCategory = w.category ? `"${w.category.replace(/"/g, '""')}"` : '""';
                const safeMeaning = w.meaning ? `"${w.meaning.replace(/"/g, '""')}"` : '""';
                const safeExample = w.example ? `"${w.example.replace(/"/g, '""')}"` : '""';
                const safePos = w.pos ? `"${w.pos}"` : '""';

                csvContent += `${safeCategory},${w.word},${safePos},${w.phonetic || ''},${safeMeaning},${safeExample},${levelText},${lastDate},${nextDate}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            const exportPrefix = currentListMode === 'favorite' ? '雅思收藏单词' : '雅思背诵记录';
            link.setAttribute("download", `${exportPrefix}_${new Date().toLocaleDateString()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 在列表中修改单词熟练度
        function changeWordLevel(word, event) {
            event.stopPropagation();
            const record = wordData[word];
            if (!record) return;

            const currentLevel = record.level;
            const levels = [
                { value: 1, text: '生疏', days: 1, color: '#ff7675' },
                { value: 2, text: '模糊', days: 2, color: '#fdcb6e' },
                { value: 3, text: '熟悉', days: 4, color: '#55efc4' },
                { value: 5, text: '简单', days: 7, color: '#00cec9' }
            ];

            // 创建自定义弹窗
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:2000;display:flex;justify-content:center;align-items:center;';

            const popup = document.createElement('div');
            popup.style.cssText = 'background:white;padding:25px;border-radius:15px;min-width:280px;max-width:90%;box-shadow:0 10px 40px rgba(0,0,0,0.3);';

            let buttonsHtml = levels.map(l => {
                const isCurrent = l.value === currentLevel;
                return `<button onclick="confirmLevelChange('${word}', ${l.value})" style="width:100%;margin:8px 0;padding:12px;border:2px solid ${l.color};background:${isCurrent ? l.color : 'white'};color:${isCurrent ? 'white' : l.color};border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;transition:all 0.2s;">
                    ${l.text} (${l.days}天) ${isCurrent ? '✓ 当前' : ''}
                </button>`;
            }).join('');

            popup.innerHTML = `
                <h3 style="margin:0 0 20px 0;color:#2d3436;text-align:center;font-size:18px;">修改 "${word}" 熟练度</h3>
                <div style="display:flex;flex-direction:column;">${buttonsHtml}</div>
                <button onclick="closeLevelPopup()" style="width:100%;margin-top:15px;padding:10px;background:#dfe6e9;color:#636e72;border:none;border-radius:8px;cursor:pointer;">取消</button>
            `;

            overlay.appendChild(popup);
            overlay.id = 'level-popup-overlay';
            document.body.appendChild(overlay);
        }

        function closeLevelPopup() {
            const overlay = document.getElementById('level-popup-overlay');
            if (overlay) overlay.remove();
        }

        function confirmLevelChange(word, newLevel) {
            closeLevelPopup();
            const record = wordData[word];
            if (!record) return;

            const days = newLevel === 1 ? 1 : newLevel === 2 ? 2 : newLevel === 3 ? 4 : 7;
            const nextReview = new Date();
            nextReview.setDate(nextReview.getDate() + days);
            nextReview.setHours(5, 0, 0, 0);

            wordData[word] = {
                ...record,
                level: newLevel,
                nextReview: nextReview.getTime(),
                lastReviewed: Date.now()
            };
            localStorage.setItem('ielts_word_data', JSON.stringify(wordData));
            applyFilters();
        }

        // 收藏功能
        function toggleFavorite() {
            if (!currentWord || !currentWord.word) return;

            const record = wordData[currentWord.word] || {};
            const isFavorite = !record.isFavorite;

            wordData[currentWord.word] = {
                ...record,
                isFavorite: isFavorite
            };
            localStorage.setItem('ielts_word_data', JSON.stringify(wordData));
            updateFavoriteButton();
        }

        function toggleFavoriteByWord(word, event) {
            if (event) event.stopPropagation();
            const record = wordData[word] || {};
            wordData[word] = {
                ...record,
                isFavorite: !record.isFavorite
            };
            localStorage.setItem('ielts_word_data', JSON.stringify(wordData));
            applyFilters();
        }

        function updateFavoriteButton() {
            const btn = document.getElementById('favorite-btn');
            if (!btn || !currentWord) return;

            const record = wordData[currentWord.word];
            const isFavorite = record && record.isFavorite;
            btn.innerText = isFavorite ? '★' : '☆';
            btn.title = isFavorite ? '取消收藏' : '收藏单词';
        }

        function speakCurrentWord() {
            if (currentWord && currentWord.word) {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(currentWord.word);
                    utterance.lang = 'en-US'; utterance.rate = 0.9;     
                    window.speechSynthesis.speak(utterance);
                }
            }
        }

        function nextWord() {
            const now = Date.now();
            const todayKey = getDateKey(now);
            const allWords = window.ieltsWords || [];
            let categoryWords = currentCategory === 'all' ? allWords : allWords.filter(w => w.category === currentCategory);

            // 分离到期单词：优先复习生疏1天的词
            let level1Words = []; // 生疏 - 最优先
            let otherDueWords = []; // 其他到期单词

            categoryWords.forEach(w => {
                const record = wordData[w.word];
                const isDue = !record || !record.nextReview || getDateKey(record.nextReview) <= todayKey;
                if (isDue) {
                    if (record && record.level === 1) {
                        level1Words.push(w); // 生疏的词优先
                    } else {
                        otherDueWords.push(w);
                    }
                }
            });

            // 合并：生疏的词排在前面
            let dueWords = [...level1Words, ...otherDueWords];

            document.getElementById('review-count').innerText = dueWords.length;

            if (dueWords.length === 0) {
                document.getElementById('word').innerText = "All Done!"; document.getElementById('phonetic').innerText = "";
                document.getElementById('pos-container').innerHTML = '';
                document.getElementById('meaning').innerText = `本分类下今日任务已完成🎉\n可以切换其他词库继续！`;
                document.getElementById('controls').style.display = 'none'; return;
            }

            // 优先从生疏的词里选，没有才从其他到期词里随机选
            if (level1Words.length > 0) {
                currentWord = level1Words[Math.floor(Math.random() * level1Words.length)];
            } else {
                currentWord = otherDueWords[Math.floor(Math.random() * otherDueWords.length)];
            }
            document.getElementById('word').innerText = currentWord.word; document.getElementById('phonetic').innerText = currentWord.phonetic || "";
            
            const posContainer = document.getElementById('pos-container'); posContainer.innerHTML = ''; 
            if (currentWord.pos) {
                const posArray = currentWord.pos.split(/[\/\s]+/).filter(p => p.trim() !== '');
                posArray.forEach(p => { const span = document.createElement('span'); span.className = 'pos-badge'; span.innerText = p; posContainer.appendChild(span); });
            }

            document.getElementById('meaning').innerText = "点击看释义"; 
            
            if(document.body.classList.contains('dark-mode')){
                document.getElementById('meaning').style.color = "#636e72"; 
            } else {
                document.getElementById('meaning').style.color = "#ccc";
            }
            
            document.getElementById('start-btn').style.display = 'none'; document.getElementById('controls').style.display = 'grid';

            // 更新收藏按钮状态
            updateFavoriteButton();

            if (autoSpeakEnabled) speakCurrentWord();
            document.getElementById('meaning').onclick = function() {
                this.innerText = currentWord.meaning + (currentWord.example ? "\n\n" + currentWord.example : ""); 
                if(document.body.classList.contains('dark-mode')){
                    this.style.color = "#dcdde1";
                } else {
                    this.style.color = "#636e72";
                }
            };
        }

        function handleRate(days) {
            // 计算下次复习时间：设置为几天后凌晨0点（而不是精确的24小时后）
            const now = new Date();
            const nextReview = new Date(now.getFullYear(), now.getMonth(), now.getDate() + days, 5, 0, 0).getTime();
            wordData[currentWord.word] = { nextReview: nextReview, level: days, lastReviewed: Date.now() };
            localStorage.setItem('ielts_word_data', JSON.stringify(wordData));
            dailyCount++; localStorage.setItem('ielts_study_count', dailyCount);
            localStorage.setItem('ielts_study_date', now.toDateString());
            document.getElementById('count').innerText = dailyCount;
            nextWord();
        }

        function resetCount() {
            if(confirm("确定要彻底重置所有单词进度和计数吗？操作前请备份！此操作不可逆！")) { localStorage.clear(); location.reload(); }
        }

        function backupProgress() {
            const data = {
                wordData: JSON.parse(localStorage.getItem('ielts_word_data') || '{}'),
                dailyCount: localStorage.getItem('ielts_study_count') || '0'
            };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `雅思备份_${new Date().toLocaleDateString()}.json`;
            link.click();
        }

        function importProgress(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.wordData) {
                        if (confirm("导入将覆盖当前的背诵进度，确定吗？")) {
                            localStorage.setItem('ielts_word_data', JSON.stringify(data.wordData));
                            localStorage.setItem('ielts_study_count', data.dailyCount);
                            alert("进度恢复成功！页面即将刷新。");
                            location.reload();
                        }
                    } else {
                        alert("文件格式不正确！");
                    }
                } catch (err) {
                    alert("读取失败，请确保文件是正确的备份格式。");
                }
            };
            reader.readAsText(file);
        }
    </script>
