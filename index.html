<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雅思词汇闪卡 - 旗舰版</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        /* --- 基础样式 --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: row; height: 100vh; margin: 0; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            overflow: hidden; 
            transition: background 0.3s ease;
        }
        
        /* 电脑端默认的侧边栏样式 */
        #side-menu {
            width: 280px; height: 100vh; background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2); transition: margin-left 0.3s ease, background 0.3s ease;
            margin-left: -280px; display: flex; flex-direction: column;
            padding-top: 20px; flex-shrink: 0; z-index: 1003; overflow-y: auto;
            position: relative; /* 电脑端占位，推挤右侧 */
        }

        /* iOS Safari 适配：使用 dvh 单位 */
        @supports (height: 100dvh) {
            body { height: 100dvh; }
            #main-area { height: 100dvh; }
            #side-menu { height: 100dvh; }
        }
        #side-menu.open { margin-left: 0; }

        /* 新增：遮罩层基础样式（默认隐藏） */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: 1002;
        }

        .category-selector-container { padding: 15px 25px; border-bottom: 1px solid #f1f2f6; transition: border-color 0.3s; }
        .category-selector-container label { font-size: 14px; color: #636e72; font-weight: bold; display: block; margin-bottom: 8px; }
        #category-select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #dfe6e9; color: #2d3436; font-size: 14px; outline: none; transition: all 0.3s; }

        #side-menu a { padding: 18px 25px; text-decoration: none; color: #2d3436; font-size: 16px; font-weight: bold; border-bottom: 1px solid #f1f2f6; transition: 0.2s; }
        #side-menu a:hover { background: #f8f9fa; color: #6c5ce7; padding-left: 30px; }
        
        #main-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; height: 100vh; overflow: hidden; transition: width 0.3s ease; }

        #menu-btn {
            position: absolute;
            top: max(20px, env(safe-area-inset-top, 20px));
            left: max(20px, env(safe-area-inset-left, 20px));
            font-size: 24px; 
            color: white; 
            cursor: pointer; 
            z-index: 1001; /* 保证在主区域最上层 */
            text-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            transition: all 0.2s; 
            background: rgba(255, 255, 255, 0.2);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            backdrop-filter: blur(5px);
        }
        #menu-btn:hover { 
            transform: scale(1.1); 
            background: rgba(255, 255, 255, 0.3);
        }

        /* 当侧边栏打开时，如果是白底，让汉堡按钮变紫 */
        #side-menu.open ~ #main-area #menu-btn {
            color: #6c5ce7; 
            background: rgba(108, 92, 231, 0.1); /* 给一点淡紫色的半透明底座 */
        }

        /* 电脑端默认卡片样式 */
        .card-container {
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            text-align: center; 
            width: 350px; 
            transition: all 0.3s ease; 
            max-height: 85vh; 
            display: flex; 
            flex-direction: column; 
        }

        /* --- 手机端响应式布局核心 --- */
        @media (max-width: 600px) {
            #side-menu {
                position: fixed; /* 手机端悬浮在上方，不推挤 */
                width: 80%;      /* 占据 80% 屏幕 */
                max-width: 300px;
                margin-left: -100%; /* 默认藏在最左侧外 */
            }
            #side-menu.open {
                margin-left: 0;
            }
            /* 手机端打开菜单时，显示遮罩层 */
            #side-menu.open ~ #overlay {
                display: block;
            }
            /* 手机端主区域强制满宽 */
            #main-area {
                width: 100% !important;
                margin-left: 0 !important;
            }
            /* 手机端卡片微调，防拥挤 */
            .card-container {
                width: 85vw;
                padding: 25px 20px;
            }
        }

        #welcome-screen h1 { color: #6c5ce7; font-size: 36px; margin-bottom: 10px; transition: color 0.3s; }
        #welcome-screen p { color: #636e72; font-size: 16px; margin-bottom: 30px; line-height: 1.6; }
        .highlight-text { color: #a29bfe; font-weight: bold; font-size: 18px; }
        #stats { font-size: 14px; color: #a29bfe; margin-bottom: 15px; font-weight: bold; }
        
        #flashcard-screen h1 { color: #2d3436; font-size: 42px; margin: 10px 0; letter-spacing: 1px; transition: color 0.3s;}
        
        #phonetic-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; min-height: 24px; flex-wrap: wrap; }
        #phonetic { color: #6c5ce7; font-size: 1.2rem; }
        
        .pos-badge { background: #a29bfe; color: white; padding: 2px 8px; border-radius: 6px; font-size: 13px; font-weight: bold; display: inline-block; }

        #current-category-badge { display: inline-block; font-size: 12px; color: #a29bfe; border: 1px solid #a29bfe; padding: 2px 8px; border-radius: 20px; margin-bottom: 15px; align-self: center; }

        #meaning { color: #636e72; font-size: 18px; min-height: 100px; margin-bottom: 30px; cursor: pointer; padding: 15px; border: 1px dashed #dfe6e9; border-radius: 10px; display: flex; align-items: center; justify-content: center; white-space: pre-wrap; overflow-y: auto; transition: all 0.3s; }
        
        #list-screen { display: none; padding: 30px 20px; width: 90%; max-width: 450px; text-align: left; max-height: 75vh; overflow: hidden; flex-direction: column; }
        #list-title { color: #6c5ce7; font-size: 24px; margin-top: 0; margin-bottom: 15px; text-align: center; transition: color 0.3s;}
        
        #list-filters { display: flex; gap: 10px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px solid #f1f2f6; justify-content: center; transition: border-color 0.3s;}
        .filter-select { padding: 6px; border-radius: 6px; border: 1px solid #dfe6e9; color: #636e72; font-size: 13px; outline: none; background: #f8f9fa; cursor: pointer; transition: all 0.3s;}

        #list-content-wrapper { overflow-y: auto; flex-grow: 1; margin-bottom: 15px; padding-right: 5px;}
        .list-item { border-bottom: 1px solid #f1f2f6; padding: 12px 0; transition: border-color 0.3s; }
        .list-word { font-weight: bold; color: #2d3436; font-size: 18px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; transition: color 0.3s;}
        .list-meaning { color: #636e72; font-size: 14px; margin-top: 5px; transition: color 0.3s;}
        
        button { background: #6c5ce7; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4); transition: transform 0.2s; width: 100%; flex-shrink: 0; }
        button:active { transform: scale(0.95); }
        #controls { display: none; grid-template-columns: 1fr 1fr; gap: 10px; }
        #flashcard-screen { display: none; }

        /* =========================================
           夜间模式专属样式
           ========================================= */
        body.dark-mode {
            background: linear-gradient(135deg, #1e1e2f 0%, #252542 100%);
        }
        body.dark-mode #side-menu,
        body.dark-mode .card-container {
            background: #2b2b36;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        body.dark-mode h1, 
        body.dark-mode #side-menu a, 
        body.dark-mode .list-word,
        body.dark-mode #flashcard-screen h1 {
            color: #f1f2f6;
        }
        body.dark-mode #welcome-screen p { color: #a4b0be; }
        body.dark-mode #side-menu a:hover {
            background: #3f3f4e;
        }
        body.dark-mode #meaning {
            color: #dcdde1;
            border-color: #4a4a6a;
        }
        body.dark-mode .category-selector-container,
        body.dark-mode .list-item,
        body.dark-mode #list-filters,
        body.dark-mode #side-menu a {
            border-bottom-color: #3f3f4e;
        }
        body.dark-mode #category-select,
        body.dark-mode .filter-select {
            background: #3f3f4e;
            color: #f1f2f6;
            border-color: #4a4a6a;
        }
        body.dark-mode .list-meaning {
            color: #a4b0be;
        }
        /* 夜间模式且侧边栏打开时，汉堡图标的颜色适应 */
        body.dark-mode #side-menu.open ~ #main-area #menu-btn {
            color: #f1f2f6;
            background: rgba(255, 255, 255, 0.1);
        }

        /* --- [进度条组件样式] --- */
        .progress-title { margin: 0 0 10px 0; font-size: 16px; color: #2d3436; }
        .progress-stats { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; color: #636e72; }
        .progress-bar-bg { width: 100%; height: 12px; background: #dfe6e9; border-radius: 6px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .category-progress-item { margin-bottom: 5px; }

        /* 进度条夜间模式适配 */
        body.dark-mode .progress-title { color: #f1f2f6; border-bottom-color: #3f3f4e !important; }
        body.dark-mode .progress-stats { color: #a4b0be; }
        body.dark-mode .progress-bar-bg { background: #3f3f4e; }
    </style>
</head>
<body>

    <div id="side-menu">
        <div class="category-selector-container">
            <label>📚 选择当前词库：</label>
            <select id="category-select" onchange="changeCategory()">
                <option value="all">全库混背 (All)</option>
            </select>
        </div>
        <a href="#" onclick="switchView('flashcard-screen')">📖 开始背诵</a>
        <a href="#" onclick="showList('learned')">✅ 已背诵单词</a>
        <a href="#" onclick="showList('unlearned')">⏳ 未背诵单词</a>
        <a href="#" onclick="showStatus()">📈 学习进度</a>
        <a href="#" onclick="toggleDarkMode()">🌙 / ☀️ 夜间模式</a>
        <a href="#" onclick="backupProgress()">📥 备份进度 (导出 JSON)</a>
        <a href="#" onclick="document.getElementById('import-file').click()">📤 恢复进度 (导入 JSON)</a>
        <input type="file" id="import-file" style="display:none" onchange="importProgress(this)">
        <a href="#" onclick="resetCount()" style="color: #ff7675; margin-top: auto;">⚠️ 重置所有进度</a>
    </div>

    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="main-area">
        <div id="menu-btn" onclick="toggleMenu()">☰</div>

        <div id="welcome-screen" class="card-container">
            <h1>雅思闪卡 🚀</h1>
            <p>今日已斩获单词：<br><span class="highlight-text"><span id="welcome-count">0</span> 个</span></p>
            <button onclick="enterApp()">开始今天的挑战</button>
        </div>

        <div id="flashcard-screen" class="card-container">
            <div id="current-category-badge">当前：全库混背</div>
            <div id="stats">今日：<span id="count">0</span> | 本库待复习：<span id="review-count">0</span></div>
            <h1 id="word">Ready?</h1>
            <div id="phonetic-container">
                <span id="phonetic"></span>
                <div id="pos-container" style="display: flex; gap: 5px;"></div>
            </div>
            <button onclick="speakCurrentWord()" style="background: none; border: 1px solid #6c5ce7; color: #6c5ce7; padding: 5px 15px; font-size: 12px; margin-bottom: 15px; width: auto; box-shadow: none;">🔊 再次发音</button>
            <div id="meaning">点击看释义</div>
            <div id="controls">
                <button onclick="handleRate(1)" style="background: #ff7675; font-size: 14px;">生疏 (1d)</button>
                <button onclick="handleRate(2)" style="background: #fdcb6e; font-size: 14px;">模糊 (2d)</button>
                <button onclick="handleRate(3)" style="background: #55efc4; font-size: 14px;">熟悉 (4d)</button>
                <button onclick="handleRate(5)" style="background: #00cec9; font-size: 14px;">简单 (7d)</button>
            </div>
            <button id="start-btn" onclick="nextWord()" style="display: none;">下一个</button>
        </div>

        <div id="list-screen" class="card-container">
            <h2 id="list-title">单词列表</h2>
            
            <div id="list-filters">
                <select id="filter-date" class="filter-select" onchange="applyFilters()">
                    <option value="all">📅 全部时间</option>
                    <option value="today">今天</option>
                    <option value="yesterday">昨天</option>
                    <option value="earlier">更早之前</option>
                </select>
                <select id="filter-level" class="filter-select" onchange="applyFilters()">
                    <option value="all">🧠 所有熟练度</option>
                    <option value="1">生疏 (1d)</option>
                    <option value="2">模糊 (2d)</option>
                    <option value="3">熟悉 (4d)</option>
                    <option value="5">简单 (7d)</option>
                </select>
            </div>

            <div id="list-content-wrapper">
                <div id="list-content"></div>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 10px; flex-shrink: 0; margin-bottom: 20px;">
                <button onclick="switchView('flashcard-screen')" style="flex: 1;">返回背诵</button>
                <button id="export-btn" onclick="exportToExcel()" style="flex: 1; background: #00b894; display: none;">📊 导出 Excel</button>
            </div>
        </div>

        <!-- 进度面板 -->
        <div id="status-screen" class="card-container" style="display: none; padding: 30px 20px; width: 90%; max-width: 450px; text-align: left; overflow-y: auto;">
            <h2 id="status-title" style="color: #6c5ce7; text-align: center; margin-top: 0; margin-bottom: 25px;">📊 学习进度</h2>

            <div style="margin-bottom: 30px;">
                <h3 class="progress-title">🏆 总进度</h3>
                <div class="progress-stats">
                    <span id="overall-progress-text">0 / 0</span>
                    <span id="overall-progress-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="overall-progress-fill" class="progress-bar-fill" style="background: linear-gradient(90deg, #6c5ce7, #a29bfe);"></div>
                </div>
            </div>

            <h3 class="progress-title" style="border-bottom: 1px solid #f1f2f6; padding-bottom: 10px; margin-bottom: 15px;">📁 分类进度</h3>
            <div id="category-progress-container" style="display: flex; flex-direction: column; gap: 15px;">
            </div>

            <button onclick="switchView('flashcard-screen')" style="margin-top: 25px;">返回背诵</button>
        </div>
    </div>

    <script src="words.js"></script>
    
    <script>
        let currentWord = null;
        let wordData = JSON.parse(localStorage.getItem('ielts_word_data')) || {};

        // 检查是否需要重置每日计数（跨天时）
        function getDailyCount() {
            const savedDate = localStorage.getItem('ielts_study_date');
            const today = new Date().toDateString();
            if (savedDate !== today) {
                // 新的一天，重置计数
                localStorage.setItem('ielts_study_date', today);
                localStorage.setItem('ielts_study_count', '0');
                return 0;
            }
            return parseInt(localStorage.getItem('ielts_study_count')) || 0;
        }

        let dailyCount = getDailyCount();
        let isAppStarted = false; 
        let currentListMode = 'learned'; 
        let currentCategory = localStorage.getItem('ielts_current_category') || 'all';
        let currentFilteredWords = [];

        const levelStyleMap = {
            1: { text: "生疏", color: "#ff7675" },
            2: { text: "模糊", color: "#fdcb6e" },
            3: { text: "熟悉", color: "#55efc4" },
            5: { text: "简单", color: "#00cec9" }
        };

        document.getElementById('welcome-count').innerText = dailyCount;
        document.getElementById('count').innerText = dailyCount;

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('ielts_dark_mode', isDark);
        }

        function initDarkMode() {
    const savedMode = localStorage.getItem('ielts_dark_mode');
    
    // 如果用户手动设过（true/false），就按手动来
    if (savedMode !== null) {
        if (savedMode === 'true') document.body.classList.add('dark-mode');
    } 
    // 如果用户没设过，就看系统是不是深色模式
    else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.classList.add('dark-mode');
    }
}

        function initCategories() {
            initDarkMode(); 
            
            const allWords = window.ieltsWords || [];
            const categories = [...new Set(allWords.map(w => w.category).filter(c => c))];
            const select = document.getElementById('category-select');
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat; option.innerText = cat; select.appendChild(option);
            });
            select.value = currentCategory;
            updateCategoryBadge();
        }

        function changeCategory() {
            currentCategory = document.getElementById('category-select').value;
            localStorage.setItem('ielts_current_category', currentCategory);
            updateCategoryBadge();
            if (document.getElementById('flashcard-screen').style.display === 'flex') nextWord();
        }

        function updateCategoryBadge() {
            const badge = document.getElementById('current-category-badge');
            const select = document.getElementById('category-select');
            badge.innerText = "当前：" + select.options[select.selectedIndex].text;
        }

        window.onload = initCategories;

        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            menu.classList.toggle('open');
        }

        function switchView(viewId) {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('flashcard-screen').style.display = 'none';
            document.getElementById('list-screen').style.display = 'none';
            document.getElementById('status-screen').style.display = 'none';
            document.getElementById(viewId).style.display = 'flex';
            if (viewId === 'flashcard-screen' && !isAppStarted) { isAppStarted = true; nextWord(); }
        }

        function enterApp() { switchView('flashcard-screen'); }

        function isToday(timestamp) {
            if (!timestamp) return false;
            const d = new Date(timestamp); const today = new Date();
            return d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
        }
        function isYesterday(timestamp) {
            if (!timestamp) return false;
            const d = new Date(timestamp); const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            return d.getDate() === yesterday.getDate() && d.getMonth() === yesterday.getMonth() && d.getFullYear() === yesterday.getFullYear();
        }

        function showList(type) {
            currentListMode = type;
            if (type === 'unlearned') {
                document.getElementById('list-filters').style.display = 'none';
                document.getElementById('export-btn').style.display = 'none';
            } else {
                document.getElementById('list-filters').style.display = 'flex';
                document.getElementById('filter-date').value = 'all';
                document.getElementById('filter-level').value = 'all';
                document.getElementById('export-btn').style.display = 'block'; 
            }
            applyFilters();
            switchView('list-screen');
        }

        function applyFilters() {
            const allWords = window.ieltsWords || [];
            const categoryWords = currentCategory === 'all' ? allWords : allWords.filter(w => w.category === currentCategory);
            let targetWords = [];
            let titleText = "";

            if (currentListMode === 'learned') {
                targetWords = categoryWords.filter(w => wordData[w.word]);
                const dateFilter = document.getElementById('filter-date').value;
                const levelFilter = document.getElementById('filter-level').value;

                if (dateFilter === 'today') targetWords = targetWords.filter(w => isToday(wordData[w.word].lastReviewed));
                else if (dateFilter === 'yesterday') targetWords = targetWords.filter(w => isYesterday(wordData[w.word].lastReviewed));
                else if (dateFilter === 'earlier') targetWords = targetWords.filter(w => !isToday(wordData[w.word].lastReviewed) && !isYesterday(wordData[w.word].lastReviewed));

                if (levelFilter !== 'all') targetWords = targetWords.filter(w => wordData[w.word].level == levelFilter);

                titleText = `✅ 已背诵 (${targetWords.length})`;
            } else {
                targetWords = categoryWords.filter(w => !wordData[w.word]); 
                titleText = `⏳ 未背诵 (${targetWords.length})`;
                
                if (targetWords.length > 100) {
                    titleText += " (仅展示前100个)";
                    targetWords = targetWords.slice(0, 100);
                }
            }

            currentFilteredWords = targetWords;
            document.getElementById('list-title').innerText = titleText;
            renderListHTML(targetWords);
        }

        // 生成并展示学习进度
        function showStatus() {
            const allWords = window.ieltsWords || [];
            if (allWords.length === 0) return;

            // 1. 计算总进度
            const totalWords = allWords.length;
            const learnedWords = allWords.filter(w => wordData[w.word]).length;
            const overallPercent = totalWords === 0 ? 0 : Math.round((learnedWords / totalWords) * 100);

            document.getElementById('overall-progress-text').innerText = `${learnedWords} / ${totalWords}`;
            document.getElementById('overall-progress-percent').innerText = `${overallPercent}%`;

            // 2. 计算各个分类的进度
            const categoryStats = {};
            allWords.forEach(w => {
                const cat = w.category || '未分类';
                if (!categoryStats[cat]) categoryStats[cat] = { total: 0, learned: 0 };
                categoryStats[cat].total++;
                if (wordData[w.word]) categoryStats[cat].learned++;
            });

            // 3. 动态生成分类进度条 HTML
            const container = document.getElementById('category-progress-container');
            container.innerHTML = '';
            const sortedCategories = Object.keys(categoryStats).sort();

            let html = '';
            sortedCategories.forEach(cat => {
                const stats = categoryStats[cat];
                const percent = stats.total === 0 ? 0 : Math.round((stats.learned / stats.total) * 100);
                html += `
                <div class="category-progress-item">
                    <div class="progress-stats">
                        <span style="font-weight: bold;">${cat}</span>
                        <span>${stats.learned} / ${stats.total} (${percent}%)</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: 0%; background: linear-gradient(90deg, #00b894, #55efc4);"></div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;

            // 4. 切换到进度面板
            switchView('status-screen');

            // 5. 延迟执行动画
            setTimeout(() => {
                document.getElementById('overall-progress-fill').style.width = `${overallPercent}%`;
                const fills = container.querySelectorAll('.progress-bar-fill');
                sortedCategories.forEach((cat, index) => {
                    const stats = categoryStats[cat];
                    const percent = stats.total === 0 ? 0 : Math.round((stats.learned / stats.total) * 100);
                    if (fills[index]) fills[index].style.width = `${percent}%`;
                });
            }, 50);
        }

        function renderListHTML(wordsArray) {
            const content = document.getElementById('list-content');
            content.innerHTML = '';
            if (wordsArray.length === 0) { content.innerHTML = '<p style="text-align:center; color:#ccc; margin-top:30px;">没有找到符合条件的单词~</p>'; return; }

            wordsArray.forEach(w => {
                let posBadgesHTML = '';
                if (w.pos) {
                    const posArray = w.pos.split(/[\/\s]+/).filter(p => p.trim() !== '');
                    posBadgesHTML = posArray.map(p => `<span class="pos-badge" style="padding: 2px 6px; font-size: 11px; margin-right: 2px;">${p}</span>`).join('');
                }
                let memoryBadgeHTML = '';
                if (currentListMode === 'learned') {
                    const record = wordData[w.word];
                    if (record && record.level && levelStyleMap[record.level]) {
                        const styleInfo = levelStyleMap[record.level];
                        memoryBadgeHTML = `<span style="border: 1px solid ${styleInfo.color}; color: ${styleInfo.color}; padding: 1px 5px; border-radius: 4px; font-size: 10px; margin-left: auto;">${styleInfo.text}</span>`;
                    }
                }
                content.innerHTML += `
                    <div class="list-item">
                        <div class="list-word"><span>${w.word}</span><div style="display:flex; gap:2px; flex-wrap:wrap;">${posBadgesHTML}</div><span style="font-size:13px; color:#a29bfe; font-weight:normal; margin-left: 4px;">${w.phonetic || ''}</span>${memoryBadgeHTML}</div>
                        <div class="list-meaning">${w.meaning}</div>
                    </div>`;
            });
        }

        function exportToExcel() {
            if (currentFilteredWords.length === 0) {
                alert("当前列表为空，没有可以导出的数据！");
                return;
            }

            let csvContent = "\uFEFF"; 
            csvContent += "分类,单词,词性,音标,释义,例句,熟练度,最近打卡日期,下次复习日期\n";

            currentFilteredWords.forEach(w => {
                const record = wordData[w.word] || {};
                const levelText = record.level ? levelStyleMap[record.level].text : "无记录";
                
                const lastDate = record.lastReviewed ? new Date(record.lastReviewed).toLocaleDateString() : "无记录";
                const nextDate = record.nextReview ? new Date(record.nextReview).toLocaleDateString() : "无记录";
                
                const safeCategory = w.category ? `"${w.category.replace(/"/g, '""')}"` : '""';
                const safeMeaning = w.meaning ? `"${w.meaning.replace(/"/g, '""')}"` : '""';
                const safeExample = w.example ? `"${w.example.replace(/"/g, '""')}"` : '""';
                const safePos = w.pos ? `"${w.pos}"` : '""';

                csvContent += `${safeCategory},${w.word},${safePos},${w.phonetic || ''},${safeMeaning},${safeExample},${levelText},${lastDate},${nextDate}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `雅思背诵记录_${new Date().toLocaleDateString()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function speakCurrentWord() {
            if (currentWord && currentWord.word) {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(currentWord.word);
                    utterance.lang = 'en-US'; utterance.rate = 0.9;     
                    window.speechSynthesis.speak(utterance);
                }
            }
        }

        function nextWord() {
            const now = Date.now();
            const allWords = window.ieltsWords || [];
            let categoryWords = currentCategory === 'all' ? allWords : allWords.filter(w => w.category === currentCategory);

            // 分离到期单词：优先复习生疏(1天)的词
            let level1Words = []; // 生疏 - 最优先
            let otherDueWords = []; // 其他到期单词

            categoryWords.forEach(w => {
                const record = wordData[w.word];
                if (!record || record.nextReview <= now) {
                    if (record && record.level === 1) {
                        level1Words.push(w); // 生疏的词优先
                    } else {
                        otherDueWords.push(w);
                    }
                }
            });

            // 合并：生疏的词排在前面
            let dueWords = [...level1Words, ...otherDueWords];

            document.getElementById('review-count').innerText = dueWords.length;

            if (dueWords.length === 0) {
                document.getElementById('word').innerText = "All Done!"; document.getElementById('phonetic').innerText = "";
                document.getElementById('pos-container').innerHTML = '';
                document.getElementById('meaning').innerText = `本分类下今日任务已完成 🎉\n可以切换其他词库继续！`;
                document.getElementById('controls').style.display = 'none'; return;
            }

            // 优先从生疏的词里选，没有才从其他到期词里随机选
            if (level1Words.length > 0) {
                currentWord = level1Words[Math.floor(Math.random() * level1Words.length)];
            } else {
                currentWord = otherDueWords[Math.floor(Math.random() * otherDueWords.length)];
            }
            document.getElementById('word').innerText = currentWord.word; document.getElementById('phonetic').innerText = currentWord.phonetic || "";
            
            const posContainer = document.getElementById('pos-container'); posContainer.innerHTML = ''; 
            if (currentWord.pos) {
                const posArray = currentWord.pos.split(/[\/\s]+/).filter(p => p.trim() !== '');
                posArray.forEach(p => { const span = document.createElement('span'); span.className = 'pos-badge'; span.innerText = p; posContainer.appendChild(span); });
            }

            document.getElementById('meaning').innerText = "点击看释义"; 
            
            if(document.body.classList.contains('dark-mode')){
                document.getElementById('meaning').style.color = "#636e72"; 
            } else {
                document.getElementById('meaning').style.color = "#ccc";
            }
            
            document.getElementById('start-btn').style.display = 'none'; document.getElementById('controls').style.display = 'grid';

            speakCurrentWord();
            document.getElementById('meaning').onclick = function() {
                this.innerText = currentWord.meaning + (currentWord.example ? "\n\n" + currentWord.example : ""); 
                if(document.body.classList.contains('dark-mode')){
                    this.style.color = "#dcdde1";
                } else {
                    this.style.color = "#636e72";
                }
            };
        }

        function handleRate(days) {
            // 计算下次复习时间：设置为几天后凌晨5点（而不是精确的24小时后）
            const now = new Date();
            const nextReview = new Date(now.getFullYear(), now.getMonth(), now.getDate() + days, 5, 0, 0).getTime();
            wordData[currentWord.word] = { nextReview: nextReview, level: days, lastReviewed: Date.now() };
            localStorage.setItem('ielts_word_data', JSON.stringify(wordData));
            dailyCount++; localStorage.setItem('ielts_study_count', dailyCount);
            localStorage.setItem('ielts_study_date', now.toDateString());
            document.getElementById('count').innerText = dailyCount;
            nextWord();
        }

        function resetCount() {
            if(confirm("确定要彻底重置所有单词进度和计数吗？此操作不可逆！")) { localStorage.clear(); location.reload(); }
        }

        function backupProgress() {
            const data = {
                wordData: JSON.parse(localStorage.getItem('ielts_word_data') || '{}'),
                dailyCount: localStorage.getItem('ielts_study_count') || '0'
            };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `雅思备份_${new Date().toLocaleDateString()}.json`;
            link.click();
        }

        function importProgress(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.wordData) {
                        if (confirm("导入将覆盖当前的背诵进度，确定吗？")) {
                            localStorage.setItem('ielts_word_data', JSON.stringify(data.wordData));
                            localStorage.setItem('ielts_study_count', data.dailyCount);
                            alert("进度恢复成功！页面即将刷新。");
                            location.reload();
                        }
                    } else {
                        alert("文件格式不正确！");
                    }
                } catch (err) {
                    alert("读取失败，请确保文件是正确的备份格式。");
                }
            };
            reader.readAsText(file);
        }
    </script>
